baseURL: "https://luoxingqi.github.io/myblog/"
languageCode: "zh-CN"
title: "我的博客"
theme: "PaperMod"
paginate: 10

params:
  description: "个人技术博客，记录学习与实践"
  author: "luoxingqi"
  defaultContentLanguage: "zh"
  showReadingTime: true
  disableShare: false
  disableToc: false
  # 评论配置：已切换为 Utterances（基于 Issues）。
  # 如果想改回 Giscus，请参考 docs/giscus-setup.md 并把 giscus.enable 设为 true。
  giscus:
    enable: false
    repo: "luoxingqi/myblog"
    repoId: "REPO_ID"
    category: "Comments"
    categoryId: "CATEGORY_ID"
    mapping: "pathname"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    theme: "light"
    lang: "zh-CN"
  utterances:
    enable: true
    repo: "luoxingqi/myblog"
    issueTerm: "pathname"
    label: "comment"
    theme: "github-light"

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod
